<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow</title>
    <link rel="stylesheet" href="style.css">   
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">

        <!---Header--->
        <header>
            <h1>StudyFlow</h1>
            <p class="subtitle">Organizate. Enfócate. Avanza.</p>
        </header>

        <!----Organizador de tareas---->

        <section class="tasks-section">
            <h2>Organizador de Tareas</h2>

            <form id="taskForm">
                <input type="text" id="title" placeholder="Nombre de la tarea" required>

                <input type="text" id="subject" placeholder="Materia o categoría" required>

                <input type="date" id="dueDate" required>

                <select id="priority" required>
                    <option value="">Prioridad</option>
                    <option value="Baja">Baja</option>
                    <option value="Media">Media</option>
                    <option value="Alta">Alta</option>
                </select>

                <button type="submit">Agregar tarea</button>
            </form>

            <div id="taskList" class="task-list">
                <!-- Aquí se renderizan las tareas -->
            </div>
        </section>

        <!-- ========================= -->
        <!-- POMODORO -->
        <!-- ========================= -->

        <section class="pomodoro-section">
            <h2>Temporizador</h2>

            <div class="timer">
                <h3 id="mode">Modo estudio</h3>
                <div id="time">25:00</div>
            </div>

            <div class="timer-buttons">
                <button id="startBtn">Iniciar</button>
                <button id="resetBtn">Reiniciar</button>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>Versión 1.0</p>
            <p>Creado por TecnoSpace</p>
        </footer>

    </div>

    <script src="script.js"></script>

    <script>
    if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker registrado"));
}
</script>
</body>
</html>
